    spread: [-0.08, 0.08]
  paper:
    index: [0.00, 0.22]
    middle: [0.00, 0.22]
    ring: [0.00, 0.22]
    pinky: [0.00, 0.22]
    thumb: [0.00, 0.35]
    spread: [0.06, 0.30]
  scissors:
    index: [0.00, 0.22]
    middle: [0.00, 0.22]
    ring: [0.78, 1.00]
    pinky: [0.78, 1.00]
    thumb: [0.10, 0.80]
    spread: [0.02, 0.24]
  ambiguous:
    index: [0.36, 0.62]
    middle: [0.36, 0.62]
    ring: [0.36, 0.62]
    pinky: [0.36, 0.62]
