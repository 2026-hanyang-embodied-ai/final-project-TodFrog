seed: 20260605
person_count: 60
samples_per_label_per_person: 6
sequence_length: 24
train_fraction: 0.60
val_fraction: 0.20
labels: [rock, paper, scissors, ambiguous]

output:
  dataset_npz: data/synthetic/rps_pose_family_dataset.npz
  metadata_json: data/synthetic/rps_pose_family_metadata.json
  audit_json: results/pose_family_audit.json

views:
  yaw_degrees: [0, 45, 90, 135, 180, 225, 270, 315]
  pitch_degrees: [-20, 0, 20]
  val_yaw_degrees: [45, 225]
  test_yaw_degrees: [135, 315]

person_variation:
  handedness: [right, left]
  palm_width_range: [0.075, 0.110]
  finger_length_scale_range: [0.82, 1.22]

motion:
  speed_range_s: [0.24, 0.68]
  start_pose: fist
  start_hold_ratio: 0.25
  transition_onset_range: [0.20, 0.34]
  finger_open_delay_range: [0.00, 0.10]
  motion_style: staggered_finger_open
  abstain_before_motion: true
  hesitation_probability: 0.25
  noise_std: 0.0015

